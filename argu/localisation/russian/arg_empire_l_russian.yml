l_russian:
 # Названия страны
 ARG_empire_cosmetic_fascism:0 "Аргентинская Империя"
 ARG_empire_cosmetic_fascism_DEF:0 "Аргентинская Империя"
 ARG_empire_cosmetic_fascism_ADJ:0 "Имперская"

 # Фокусы
 ARG_emperor_arrives:0 "Возвращение монарха"
 ARG_emperor_arrives_desc:0 "Долгие годы наша нация страдала от нестабильности. Пришло время сильной руке взять власть. Да здравствует Император!"
 
 ARG_proclaim_the_empire:0 "Провозглашение Империи"
 ARG_proclaim_the_empire_desc:0 "Республика пала. Отныне Аргентина — великая Империя Южной Америки."
 
 ARG_imperial_ambitions:0 "Имперские амбиции"
 ARG_imperial_ambitions_desc:0 "Наши границы слишком узки для величия нации. Пора готовить армию к экспансии."
 
 ARG_the_falkland_trap:0 "Дипломатический инцидент (Ловушка)"
 ARG_the_falkland_trap_desc:0 "Мы отправим наш флот в спорные воды, спровоцировав британцев. Они подумают, что это легкая победа, но мы будем готовы..."

 # Ивенты
 arg_empire_event.1.t:0 "Аргентинская провокация!"
 arg_empire_event.1.d:0 "Новоявленная «Аргентинская Империя» зашла слишком далеко. Их флот блокирует торговые пути, а их лидер открыто заявляет права на наши заморские территории. Парламент в ярости. Мы должны преподать им урок и покончить с этой так называемой Империей раз и навсегда!"
 arg_empire_event.1.a:0 "Боже, храни Короля! Объявить войну!"
 
 ARG_imperial_cabinet:0 "Имперский кабинет"
 ARG_advisor_military_path:0 "Назначить военного стратега"
 ARG_advisor_political_path:0 "Назначить гражданского канцлера"
 ARG_unify_the_nation:0 "Национальное единство"
 ARG_establish_secret_police:0 "Создание Спецслужб Империи"
 ARG_purge_the_opposition:0 "Великая чистка"
 ARG_imperial_youth:0 "Имперская молодежь"
 ARG_state_propaganda:0 "Министерство правды"
 ARG_south_american_hegemony:0 "Гегемония в Южной Америке"
 ARG_claim_the_andes:0 "Претензии на Анды"
 ARG_subjugate_uruguay:0 "Уругвайский протекторат"
 ARG_the_platine_question:0 "Судьба Ла-Платы"
 
 ARG_imperial_spirit:0 "Дух Имперского Возрождения"
 ARG_anti_usa_spirit:0 "Конец Доктрины Монро"
 ARG_advisor_eco:0 "Имперский Казначей"
 ARG_advisor_mil:0 "Верховный Маршал"
 ARG_advisor_spy:0 "Глава Тайной Полиции"
 ARG_advisor_dip:0 "Имперский Посол"

 ARG_imperial_consolidation:0 "Консолидация власти"
 ARG_defy_monroe_doctrine:0 "Вызов Вашингтону"
 ARG_expansion_path:0 "Внешняя экспансия"
 ARG_chile_claim:0 "Андийский поход"
 ARG_uruguay_annexation:0 "Возвращение Уругвая"
 ARG_recruit_advisors:0 "Формирование Кабинета"
 ARG_advisor_1:0 "Назначить Казначея"
 ARG_advisor_2:0 "Назначить Маршала"
 ARG_advisor_3:0 "Назначить Шефа Разведки"
 ARG_advisor_4:0 "Назначить Дипломата"

 # ============================================================
 # ФОКУСЫ — ЦЕНТРАЛЬНАЯ ВЕТКА
 # ============================================================
 ARG_rise_of_the_emperor:0 "Возвышение Императора"
 ARG_rise_of_the_emperor_desc:0 "Аргентина стоит на пороге новой эры. Народ устал от слабых президентов и коррумпированных республиканцев. Настало время сильной руки — руки Императора."

 ARG_proclaim_empire:0 "Провозглашение Империи"
 ARG_proclaim_empire_desc:0 "Под знаменем нового Императора Аргентина перестаёт быть республикой. Отныне это — Империя. Флаги сменены, гимн переписан. Мир узнает о рождении новой великой державы."

 ARG_imperial_shipyards:0 "Имперские Верфи"
 ARG_imperial_shipyards_desc:0 "Империи нужен флот, достойный её амбиций. Все побережья Аргентины покрываются верфями. Тысячи рабочих трудятся день и ночь, строя корабли, которым суждено бороздить все океаны мира."

 # ============================================================
 # ФОКУСЫ — ПРАВАЯ ВЕТКА (СОВЕТНИКИ)
 # ============================================================
 ARG_imperial_command:0 "Имперский Генеральный Штаб"
 ARG_imperial_command_desc:0 "Создание единого командования вооружёнными силами Империи. Лучшие военные умы страны собраны в одном месте."

 ARG_master_of_attack:0 "Мастер Наступления"
 ARG_master_of_attack_desc:0 "Назначение верховного советника по наступательным операциям. Его доктрина проста: атакуй, пока враг не сломлен."

 ARG_fortress_doctrine:0 "Доктрина Крепости"
 ARG_fortress_doctrine_desc:0 "Советник по обороне превращает Аргентину в неприступную крепость. Каждый дюйм земли будет защищён."

 ARG_grand_admiral:0 "Великий Кто-то"
 ARG_grand_admiral_desc:0 "Мы сами хз че это за черт"

 ARG_industrial_empire:0 "Промышленный Колосс"
 ARG_industrial_empire_desc:0 "Имперский советник по промышленности организует невиданный рост производства. Заводы работают круглосуточно."

 ARG_imperial_war_machine:0 "Машина Империи"
 ARG_imperial_war_machine_desc:0 "Все элементы военной машины Империи собраны воедино. Армия, флот и промышленность работают как единый организм."

 # ============================================================
 # ФОКУСЫ — ЛЕВАЯ ВЕТКА (ЗАВОЕВАНИЕ МИРА)
 # ============================================================
 ARG_imperial_manifest_destiny:0 "Имперское Предназначение"
 ARG_imperial_manifest_destiny_desc:0 "История определила Аргентину как будущего правителя мира. Это не амбиция — это судьба. Имперский манифест объявлен, цели поставлены."

 ARG_subjugate_south_america:0 "Покорение Южной Америки"
 ARG_subjugate_south_america_desc:0 "Южная Америка должна стать первым владением Империи. Все соседние государства получат ультиматум: вступить в Империю добровольно или быть завоёванными."

 ARG_crush_brazil:0 "Сокрушить Бразилию"
 ARG_crush_brazil_desc:0 "Бразилия — главное препятствие на пути к власти над континентом. Её нужно уничтожить. Военная кампания против Бразилии — первый шаг к мировому господству."

 ARG_pax_argentina:0 "Аргентинский Мир"
 ARG_pax_argentina_desc:0 "Подобно Pax Romana, Аргентина установит собственный мировой порядок. Страны, принявшие имперскую власть, будут процветать. Остальные — пожалеют."

 ARG_conquer_africa:0 "Покорение Африки"
 ARG_conquer_africa_desc:0 "Африка — богатейший континент, разграбленный европейцами. Теперь её ресурсы будут служить Империи Аргентины."

 ARG_imperial_navy_domination:0 "Владычество на Морях"
 ARG_imperial_navy_domination_desc:0 "Контроль над торговыми путями — ключ к мировому господству. Имперский флот становится крупнейшим в мире."

 ARG_storm_europe:0 "Буря над Европой"
 ARG_storm_europe_desc:0 "Старый мир с его монархами и демократиями должен пасть. Имперские армии пересекают океан, чтобы принести порядок на измученный войнами континент."

 ARG_empire_of_the_sun:0 "Империя Солнца"
 ARG_empire_of_the_sun_desc:0 "Азия — последний великий приз. Древние цивилизации востока склонятся перед имперским орлом."

 ARG_one_world_empire:0 "Единая Мировая Империя"
 ARG_one_world_empire_desc:0 "Это исторический момент. Аргентина объявляет себя Единственной Мировой Империей. Все флаги спущены, над каждой столицей мира развевается имперское знамя. Мир объединён."

 # ============================================================
 # СОБЫТИЯ ВЕЛИКОБРИТАНИИ
 # ============================================================
 ARG_empire_britain.1.t:0 "Дерзость Аргентинцев!"
 ARG_empire_britain.1.d:0 "Эти самонадеянные южноамериканцы объявили себя Империей! Мало того — они строят флот, который угрожает нашим торговым путям. Британия не потерпит подобного вызова. Парламент единогласен: нужно немедленно объявить войну этому ублюдочному государству и раздавить его в зародыше, пока оно не стало реальной угрозой!"
 ARG_empire_britain.1.a:0 "За Британию! Объявить войну!"

 # ============================================================
 # НОВОСТНЫЕ СОБЫТИЯ
 # ============================================================
 ARG_empire_news.1.t:0 "Аргентина: Новый Лидер Приходит к Власти"
 ARG_empire_news.1.d:0 "В Буэнос-Айресе произошёл государственный переворот. Демократическое правительство свергнуто. Новый лидер — человек с железной волей — взял власть в свои руки под ликование националистических масс."
 ARG_empire_news.1.a:0 "Мир меняется..."

 ARG_empire_news.2.t:0 "Аргентина провозглашена Империей!"
 ARG_empire_news.2.d:0 "Беспрецедентное событие в истории Южной Америки. Аргентина официально провозгласила себя Империей. Новый флаг поднят над дворцом в Буэнос-Айресе. Весь мир наблюдает с тревогой."
 ARG_empire_news.2.a:0 "Это начало конца..."

 # ============================================================
 # СОВЕТНИКИ — ИМЕНА И ОПИСАНИЯ
 # ============================================================
 ARG_idea_master_of_attack:0 "Генерал Наступления"
 ARG_idea_master_of_attack_desc:0 "Мастер наступательной войны. Его тактика — постоянное давление и удар в самое сердце врага."

 ARG_idea_fortress_doctrine:0 "Маршал Обороны"
 ARG_idea_fortress_doctrine_desc:0 "Превратит каждый клочок аргентинской земли в неприступную крепость."

 ARG_idea_industrial_tsar:0 "Имперский Промышленный Советник"
 ARG_idea_industrial_tsar_desc:0 "Увеличивает производство заводов и скорость строительства промышленных объектов."

 ARG_idea_grand_admiral:0 "Великий Адмирал Флота"
 ARG_idea_grand_admiral_desc:0 "Командует имперским флотом. Под его руководством аргентинский флот станет грозой всех морей."

 ARG_emperor_desc:0 "Рождённый повелевать. Железная воля, стальной характер. Аргентина наконец обрела того, кто поведёт её к мировому господству."
 
 # ==========================================
 # КОСМЕТИЧЕСКИЙ ТЕГ — Империя Америка
 # ==========================================
 USA_EMPIRE: "Империя Америка"
 USA_EMPIRE_ADJ: "Американской Империи"

 # ==========================================
 # ИВЕНТ 1: Ранение Императора
 # ==========================================
 arg_story.1.t: "Государь ранен!"
 arg_story.1.d: "Во время одного из сражений Император Егор Доброгей получил тяжёлое ранение. Дворец потрясён. Однако весть о том, что Государь выжил, стремительно разлетается по стране — и народ, сжав зубы, готов стоять ещё крепче."
 arg_story.1.a: "Аргентина не преклонит колен!"

 # ==========================================
 # ИВЕНТ 2: Гибель Астольфо (ARG_femboy_char)
 # ==========================================
 arg_story.2.t: "Астольфо пал"
 arg_story.2.d: "Сообщения с фронта неутешительны. Астольфо — один из самых ярких офицеров Аргентины — погиб при невыясненных обстоятельствах в ходе боевых действий. Обстоятельства его гибели туманны, тело так и не было найдено."
 arg_story.2.a: "Скорбим о нём…"

 # ==========================================
 # ИВЕНТ 3: Гибель ARG_factory_char (Аннексия Парагвая)
 # ==========================================
 arg_story.3.t: "Жертва аннексии"
 arg_story.3.d: "При штурме парагвайских укреплений наш промышленный куратор лично возглавил атаку и был сражён вражеским огнём. Его потеря — удар по оборонному производству. Цена Парагвая оказалась выше, чем мы рассчитывали."
 arg_story.3.a: "Он заплатил высшую цену."

 # ==========================================
 # ИВЕНТ 4: Пропажа ARG_zelen_char (Венесуэла)
 # ==========================================
 arg_story.4.t: "Он исчез"
 arg_story.4.d: "После капитуляции Венесуэлы один из наших советников бесследно пропал. Последние сведения — он был замечен на границе, после чего связь оборвалась. Жив ли он — неизвестно. Поиски ни к чему не привели."
 arg_story.4.a: "Найти его. Немедленно."

 # ==========================================
 # ИВЕНТ 5: АСТОЛЬФО ЖИВ — Визит в кабинет Императора
 # ==========================================
 arg_story.5.t: "Призрак в кабинете"
 arg_story.5.d: "Поздней ночью охрана доложила о взломе личного кабинета Императора. Прежде чем стражу успели поднять, незваный гость уже стоял напротив Государя.\n\nЭто был Астольфо.\n\nОн смотрел спокойно — без страха, без злобы. «Я не умирал,» — произнёс он тихо. — «Я лишь дал тебе поверить в это. Считай это первым уроком.» Он обещал отомстить — холодно, методично. А затем, не дав никому опомниться, шагнул к окну и прыгнул вниз.\n\nОхрана бросилась на улицу. Там не было никого."
 arg_story.5.a: "Поднять тревогу. Найти его!"

 # ==========================================
 # ИВЕНТ 6: «Император, Америка…»
 # ==========================================
 arg_story.6.t: "Срочное донесение"
 arg_story.6.d: "— Ваше Величество, Америка…\n\nСлова адъютанта оборвались. Лицо его побледнело. Бумага в его руке мелко дрожала.\n\nОн не мог закончить фразу."
 arg_story.6.a: "Что?!"

 # ==========================================
 # ИВЕНТ 7: Война — Империя Америка атакует ARG
 # (Срабатывает на стороне США)
 # ==========================================
 arg_story.7.t: "Мы объявляем войну"
 arg_story.7.d: "Империя Америка объявляет войну Аргентинской Империи. Астольфо лично зачитал декларацию с балкона Белого дома, переименованного в Чёрный Дворец.\n\n«Аргентина думала, что я мёртв. Аргентина ошиблась.»"
 arg_story.7.a: "Во имя Империи!"

 # ==========================================
 # ОПИСАНИЕ ЛИДЕРА США — Астольфо
 # ==========================================
 USA_astolfo_leader_desc: "Некогда офицер Аргентины, объявленный погибшим. Он инсценировал собственную смерть, пересёк океан и захватил власть в Америке. Теперь он — Emperor Astolfo I, основатель Империи Америка, и его взгляд направлен на юг."


 # ============================================================
 # ВЕТКА ИНДУСТРИАЛИЗАЦИИ — ФОКУСЫ
 # ============================================================

 # Корень
 ARG_ind_plan: "Национальный Индустриальный План"
 ARG_ind_plan_desc: "Аргентина стоит на пороге новой эпохи. Пора превратить наши ресурсы и рабочую силу в настоящую промышленную мощь — систематично, железной рукой."
 ARG_ind_plan_tt: "Снижение потребительских товаров. Рост производительности заводов."

 # Левая ветка
 ARG_ind_workers: "Мобилизация Рабочей Силы"
 ARG_ind_workers_desc: "Мы открываем двери заводов для каждого трудоспособного аргентинца. Государство гарантирует работу — рабочий класс гарантирует производство."

 ARG_ind_civil_factories: "Строительство Заводов"
 ARG_ind_civil_factories_desc: "Новые гражданские предприятия вырастут там, где ещё вчера были пустыри. Каждый завод — кирпич в фундаменте Империи."

 ARG_ind_mil_factories: "Военная Промышленность"
 ARG_ind_mil_factories_desc: "Аргентине нужны не только хлеб и сталь, но и орудия. Военные заводы переключают пульс нации на военный ритм."

 ARG_ind_tech: "Научный Центр"
 ARG_ind_tech_desc: "Наука и производство неотделимы друг от друга. Новые институты откроют технологии, которые поставят нас впереди соседей на десятилетие."

 # Правая ветка
 ARG_ind_resources: "Разведка Ресурсов"
 ARG_ind_resources_desc: "Геологические экспедиции уходят в глубь страны. Аргентинская земля богата — нужно лишь взять то, что она готова отдать."

 ARG_ind_mining: "Горнодобывающая Отрасль"
 ARG_ind_mining_desc: "Шахты Патагонии и Андских предгорий заработают в полную силу. Сталь, хром, уголь — основа любой военно-промышленной машины."

 ARG_ind_infrastructure: "Транспортная Инфраструктура"
 ARG_ind_infrastructure_desc: "Ресурсы на месте — полдела. Нужны дороги и железные пути, чтобы металл, нефть и солдаты двигались туда, куда требует война."

 ARG_ind_oil: "Нефтяная Промышленность"
 ARG_ind_oil_desc: "Под аргентинской землёй скрыты миллионы тонн нефти. Новые скважины и заводы синтетического топлива обеспечат армию горючим на годы вперёд."

 # Финал
 ARG_ind_superpower: "Индустриальная Сверхдержава"
 ARG_ind_superpower_desc: "Мы прошли путь от аграрной провинции до промышленного колосса. Аргентина производит больше, чем потребляет — и отдаёт излишки на алтарь Империи."

 # ============================================================
 # НАЦИОНАЛЬНЫЕ ДУХИ
 # ============================================================

 ARG_ind_plan_spirit: "Индустриальный Манифест"
 ARG_ind_plan_spirit_desc: "Государство взяло курс на тотальную индустриализацию. Потребительский сектор временно отступает перед нуждами производства."

 ARG_labor_mobilization: "Рабочая Мобилизация"
 ARG_labor_mobilization_desc: "Каждый завод работает в три смены. Государство снижает нагрузку на потребительский рынок и направляет ресурсы в производство."

 ARG_industrial_superpower_spirit: "Промышленный Колосс"
 ARG_industrial_superpower_spirit_desc: "Аргентина вышла на уровень великих держав. Заводы работают круглосуточно, исследователи открывают новые горизонты, а армия получает всё что нужно вовремя."

