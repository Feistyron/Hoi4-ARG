l_russian:

 # ==========================================
 # КОСМЕТИЧЕСКИЙ ТЕГ — Империя Америка
 # ==========================================
 USA_EMPIRE: "Империя Америка"
 USA_EMPIRE_ADJ: "Американской Империи"

 # ==========================================
 # ИВЕНТ 1: Ранение Императора
 # ==========================================
 arg_story.1.t: "Государь ранен!"
 arg_story.1.d: "Во время одного из сражений Император Егор Доброгей получил тяжёлое ранение. Дворец потрясён. Однако весть о том, что Государь выжил, стремительно разлетается по стране — и народ, сжав зубы, готов стоять ещё крепче."
 arg_story.1.a: "Аргентина не преклонит колен!"

 # ==========================================
 # ИВЕНТ 2: Гибель Астольфо (ARG_femboy_char)
 # ==========================================
 arg_story.2.t: "оЧЕНЬ ИНТЕРЕСНО"
 arg_story.2.d: "Сообщения с фронта неутешительны. Астольфо — один из самых ярких офицеров Аргентины — погиб при невыясненных обстоятельствах в ходе боевых действий. Обстоятельства его гибели туманны, тело так и не было найдено."
 arg_story.2.a: "Какой ужас"

 # ==========================================
 # ИВЕНТ 3: Гибель ARG_factory_char (Аннексия Парагвая)
 # ==========================================
 arg_story.3.t: "Жертва аннексии"
 arg_story.3.d: "При штурме парагвайских укреплений наш промышленный куратор лично возглавил атаку и был сражён вражеским огнём. Его потеря — удар по оборонному производству. Цена Парагвая оказалась выше, чем мы рассчитывали."
 arg_story.3.a: "Какой Ужас"

 # ==========================================
 # ИВЕНТ 4: Пропажа ARG_zelen_char (Венесуэла)
 # ==========================================
 arg_story.4.t: "Он исчез"
 arg_story.4.d: "После капитуляции Венесуэлы один из наших советников бесследно пропал. Последние сведения — он был замечен на границе, после чего связь оборвалась. Жив ли он — неизвестно. Поиски ни к чему не привели."
 arg_story.4.a: "Какой УжАс!."

 # ==========================================
 # ИВЕНТ 5: АСТОЛЬФО ЖИВ — Визит в кабинет Императора
 # ==========================================
 arg_story.5.t: "Призрак в кабинете"
 arg_story.5.d: "Поздней ночью охрана доложила о взломе личного кабинета Императора. Прежде чем стражу успели поднять, незваный гость уже стоял напротив Государя.\n\nЭто был Астольфо.\n\nОн сказал - Помнишь как ты спрятал мою беременную мать у себя в подвале во время первой мировой? Так вот ты ебал ее каждый день из-за чего она умерла но я смог выбраться из ее утроба и сьев ее труп я смог выбраться и теперь тебе пизда.  А затем, не дав никому опомниться, шагнул к окну и прыгнул вниз.\n\nОхрана бросилась на улицу. Там не было никого."
 arg_story.5.a: "Какой уЖаС"

 # ==========================================
 # ИВЕНТ 6: «Император, Америка…»
 # ==========================================
 arg_story.6.t: "Срочное донесение"
 arg_story.6.d: "— Ваше Величество, Америка…\n\nСлова адъютанта оборвались. Лицо его побледнело. Бумага в его руке мелко дрожала.\n\nОн не мог закончить фразу."
 arg_story.6.a: "Какой ужас?!"

 # ==========================================
 # ИВЕНТ 7: Война — Империя Америка атакует ARG
 # (Срабатывает на стороне США)
 # ==========================================
 arg_story.7.t: "Мы объявляем войну"
 arg_story.7.d: "Империя Америка объявляет войну Аргентинской Империи. Астольфо лично зачитал декларацию с балкона Белого дома, переименованного в Чёрный Дворец.\n\n«Аргентина думала, что я мёртв. Аргентина ошиблась.»"
 arg_story.7.a: "Во имя Империи!"

 # ==========================================
 # ОПИСАНИЕ ЛИДЕРА США — Астольфо
 # ==========================================
 USA_astolfo_leader_desc: "Некогда офицер Аргентины, объявленный погибшим. Он инсценировал собственную смерть, пересёк океан и захватил власть в Америке. Теперь он — Emperor Astolfo I, основатель Империи Америка, и его взгляд направлен на юг."
 # ==========================================
 # ФОКУС: Астольфо Захватывает Америку
 # ==========================================
 ARG_astolfo_america_rises: "Тень с Севера"
 ARG_astolfo_america_rises_desc: "Агентурные донесения из Северной Америки становятся всё тревожнее. Что-то происходит за горизонтом. Что-то, что касается нас напрямую."
